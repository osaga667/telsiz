
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürünlerimiz | Lider Telsiz</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --ana-renk: #0a1f44; --accent: #3b82f6; --metin: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8fafc;
            background-image: linear-gradient(rgba(255,255,255,0.93), rgba(255,255,255,0.93)), url('arkafon.png');
            background-attachment: fixed;
            background-size: cover;
        }
        header {
            padding: 15px 8%; background: white; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;
        }
        .logo-img { height: 50px; }
        .back-btn { text-decoration: none; color: var(--ana-renk); font-weight: 700; font-family: 'Orbitron'; font-size: 0.8rem; }
        .container { padding: 50px 8%; }
        .urun-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .urun-kart { 
            background: white; border-radius: 20px; padding: 20px; text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: 0.3s;
        }
        .urun-kart:hover { transform: translateY(-10px); border-color: var(--accent); }
        .urun-kart img { width: 100%; height: 220px; object-fit: contain; margin-bottom: 15px; }
        .urun-kart h3 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--ana-renk); margin-bottom: 10px; }
        .btn-whatsapp { 
            display: inline-block; padding: 10px 20px; background: #25d366; color: white; 
            text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <img src="markalogo.png" alt="Lider Telsiz" class="logo-img">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> ANA SAYFAYA DÖN</a>
    </header>

    <div class="container">
        <h1 style="text-align: center; font-family: 'Orbitron'; color: var(--ana-renk);">Ürün Kataloğumuz</h1>
        
        <div class="urun-grid">
            <!-- Ürün Kartı Başlangıç -->
            <div class="urun-kart">
                <img src="urun1.png" alt="Ürün">
                <h3>Dijital Telsiz Serisi</h3>
                <p style="margin-bottom:15px; font-size:0.9rem; color:#64748b;">Yüksek çekim gücü, kristal ses netliği.</p>
                <a href="https://wa.me" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> Bilgi Al</a>
            </div>
            <!-- Ürün Kartı Bitiş -->

            <!-- Buraya yeni ürünler geldikçe üstteki kartın aynısını kopyalayıp altına ekleyeceğiz -->
        </div>
    </div>
</body>
</html>
