<!DOCTYPE html>  
<html lang="tr">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Lider Telsiz | Profesyonel Haberleşme Çözümleri</title>  
<meta name="description" content="İstanbul'da profesyonel telsiz kiralama hizmetleri. Film seti, organizasyon ve güvenlik ekipleri için hızlı çözüm.">  
  
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">  
  
<style>  
:root {  
    --lacivert: #0a1f44;  
    --siyah: #000000;  
    --beyaz: #ffffff;  
    --kart-bg: #0f172a;  
    --gri: #1e293b;  
    --accent: #132d63;  
}  
  
* { margin:0; padding:0; box-sizing:border-box; }  
  
body {  
    font-family: 'Poppins', sans-serif;  
    background-color: var(--siyah);  
    color: var(--beyaz);  
    overflow-x: hidden;  
    scroll-behavior: smooth;  
}  

/* REFERANS YENİ */
.ref-item {
    background: var(--kart-bg);
    border: 1px solid var(--gri);
    padding: 25px;
    border-radius: 15px;
    font-weight: 600;
    text-align: center;
    transition: 0.3s;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
}

.ref-item:hover {
    background: var(--accent);
    transform: scale(1.07);
    box-shadow: 0 10px 30px rgba(10,31,68,0.5);
}

/* HEADER */
header {
    padding: 15px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.9);
    position: fixed;
    width: 100%;
    top:0;
    z-index:1000;
    border-bottom:2px solid var(--lacivert);
    backdrop-filter: blur(10px);
    flex-wrap: wrap;
}

.logo-box { display:flex; align-items:center; text-decoration:none; }
.logo-img { height:50px; margin-right:10px; }

.logo-text {
    font-family:'Orbitron',sans-serif;
    color: var(--beyaz);
    font-weight:900;
    font-size:1.5rem;
}

.nav-right { display:flex; align-items:center; gap:30px; flex-wrap: wrap; }
.nav-right a { color:white; font-weight:bold; text-decoration:none; }

/* HERO */
.hero {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 10%;
    background: radial-gradient(circle at center, #0a1f44 0%, #000 70%);
    position: relative;
    overflow:hidden;
}

.hero-slider { position:relative; width:100%; max-width:1200px; height:100%; display:flex; align-items:center; justify-content:center; }

.hero-slide {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    transition:opacity 1s ease;
    opacity:0;
}

.hero-slide.active { opacity:1; }

.hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); font-weight:900; margin-bottom:20px; }
.hero p { max-width:600px; font-size:1.1rem; opacity:0.8; margin-bottom:30px; }

.btn-teklif {
    background: var(--lacivert);
    color: var(--beyaz);
    padding: 15px 40px;
    border-radius:50px;
    text-decoration:none;
    font-weight:700;
    transition:0.3s;
}
.btn-teklif:hover { background: var(--accent); transform:scale(1.05); }

/* HİZMETLER */
.services-section { padding:100px 8%; }

.services-title {
    font-family:'Orbitron',sans-serif;
    font-size:2rem;
    margin-bottom:50px;
    text-align:center;
}

/* Accordion */
.accordion {
    background: var(--kart-bg);
    border:1px solid var(--gri);
    border-radius:15px;
    margin-bottom:15px;
    cursor:pointer;
    padding:15px 20px;
    transition:0.3s;
    display:flex;
    justify-content:space-between;
}

.accordion:hover { background: var(--accent); }

.accordion-content {
    max-height:0;
    overflow:hidden;
    transition: max-height 0.3s ease;
    background: var(--kart-bg);
}

.accordion-content p { padding:15px; }

/* CİHAZ */
.cihazlar-section { padding:100px 8%; text-align:center; }
.section-title { font-family:'Orbitron'; margin-bottom:50px; }

.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:30px; }

.card {
    background:var(--kart-bg);
    padding:30px;
    border-radius:20px;
    transition:0.4s;
}

.card:hover { transform:translateY(-10px); }

.telsiz-img { width:100%; height:250px; object-fit:contain; }

/* REFERANSLAR */
.references-section { padding:100px 8%; }

.references-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
}

/* FOOTER */
footer {
    padding:60px 8%;
    background:#050505;
    text-align:center;
}
</style>  
</head>  

<body>  

<header>
    <a href="#" class="logo-box">
        <img src="logo.png" class="logo-img">
        <span class="logo-text">LİDER TELSİZ</span>
    </a>
</header>

<section class="hero">
    <div class="hero-slider">
        <div class="hero-slide active">
            <h1>KESİNTİSİZ İLETİŞİM</h1>
            <a href="#" class="btn-teklif">TEKLİF AL</a>
        </div>
    </div>
</section>

<section class="services-section">
    <h2 class="services-title">HİZMETLERİMİZ</h2>
</section>

<section class="cihazlar-section">
    <h2 class="section-title">CİHAZ PARKURUMUZ</h2>
</section>

<!-- REFERANSLAR -->
<section class="references-section">
    <h2 class="services-title">REFERANSLARIMIZ +50 PROJE</h2>

    <div class="references-grid">
        <div class="ref-item">Maça Film</div>
        <div class="ref-item">Sortcut Prod</div>
        <div class="ref-item">Set Gripim</div>
        <div class="ref-item">Octopus Film Yapım</div>
        <div class="ref-item">Istanbul Line Films</div>
        <div class="ref-item">Mimeda Medya</div>
        <div class="ref-item">Z Medya</div>
    </div>

    <p style="opacity:0.6; margin-top:30px; text-align:center;">
        Türkiye genelinde birçok prodüksiyon ekibi tarafından tercih ediliyoruz.
    </p>
</section>

<footer>
    © 2026 Lider Telsiz
</footer>

</body>
</html>
