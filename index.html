<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lider Telsiz | Profesyonel Haberleşme Çözümleri</title>
<meta name="description" content="İstanbul'da profesyonel telsiz kiralama hizmetleri. Film seti, organizasyon ve güvenlik ekipleri için hızlı çözüm.">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
:root {
    --ana-renk: #0a1f44;
    --accent: #1e40af;
    --beyaz: #ffffff;
    --acik-gri: #f8fafc;
    --gri-border: #e2e8f0;
    --metin: #1e293b;
    --glass-shine: rgba(255, 255, 255, 0.8);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--beyaz);
    color: var(--metin);
    overflow-x: hidden;
    scroll-behavior: smooth;
    transition: background-color 0.5s ease;
}

.reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease-out;
}
.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

.card::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, var(--glass-shine), transparent);
    transform: rotate(45deg);
    transition: 0.5s;
    opacity: 0;
}
.card:hover::after {
    opacity: 1;
    left: 50%;
    top: 50%;
}

/* Yan Menü */
.menu-toggle {
    position: fixed;
    top: 25px; 
    left: 25px;
    width: 50px;
    height: 50px;
    background: var(--ana-renk);
    color: white;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    cursor: pointer;
    z-index: 1100; 
    transition: 0.3s all ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.menu-toggle:hover {
    transform: scale(1.1) rotate(5deg);
    background: var(--accent);
}

.side-menu {
    position: fixed;
    top: 0;
    left: -350px; 
    width: 320px;
    height: 100%;
    background: var(--ana-renk); 
    z-index: 1200; 
    transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0); 
    padding: 80px 30px;
    box-shadow: 10px 0 30px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.side-menu.active {
    left: 0;
}

.close-btn {
    position: absolute;
    top: 25px;
    right: 25px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    line-height: 1;
    transition: 0.3s;
}

.menu-links {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.menu-links a {
    display: flex;
    align-items: center;
    color: white;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 600;
    transition: 0.3s all ease;
    padding: 5px 0;
}

.menu-links a i {
    margin-right: 15px;
    color: #3b82f6; 
    width: 25px;
    text-align: center;
}

/* Menü Bilgi Kutuları */
.info-box-menu {
    margin: 10px 0;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    border-left: 4px solid #3b82f6;
    cursor: pointer;
    transition: 0.3s ease;
}

.info-box-menu:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.02);
}

.info-box-menu h4 {
    color: #3b82f6;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
}

.info-box-menu h4 i { margin-right: 8px; }

.info-box-menu p {
    color: white;
    font-size: 0.7rem;
    line-height: 1.3;
    opacity: 0.8;
}

.tech-service-box {
    margin-top: 20px; 
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    color: white;
}

.tech-service-box h4 {
    font-family: 'Orbitron', sans-serif;
    color: #3b82f6;
    margin-bottom: 10px;
    font-size: 1rem;
}

.tech-service-box p {
    font-size: 0.85rem;
    opacity: 0.8;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
}

.tech-service-box p i {
    color: #3b82f6;
    margin-right: 10px;
    width: 20px;
}

/* Header */
header {
    padding: 15px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.95);
    position: fixed;
    width: 100%;
    top:0;
    z-index:1000;
    border-bottom: 1px solid var(--gri-border);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    padding-left: 90px;
}

header.scrolled {
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 10px 8% 10px 90px;
}

.logo-box {
    display:flex;
    align-items:center;
    text-decoration:none;
}

.logo-img { height:50px; margin-right:10px; }

.logo-text {
    font-family:'Orbitron',sans-serif;
    color: var(--ana-renk);
    font-weight:900;
    font-size:1.5rem;
}

/* Hero */
.hero {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 10%;
    background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%);
    position: relative;
    overflow:hidden;
}

.hero h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight:900;
    margin-bottom:20px;
    color: var(--ana-renk);
}

.btn-teklif {
    background: var(--ana-renk);
    color: var(--beyaz);
    padding: 15px 40px;
    border-radius:50px;
    text-decoration:none;
    font-weight:700;
    transition: 0.3s all ease;
    box-shadow: 0 4px 15px rgba(10, 31, 68, 0.2);
}

/* Akordeon */
.services-section { padding:100px 8%; background-color: var(--acik-gri); }

.services-title {
    font-family:'Orbitron',sans-serif;
    font-size:2.5rem;
    margin-bottom:60px;
    text-align:center;
    color: var(--ana-renk);
}

.accordion {
    background: var(--beyaz);
    border: 1px solid var(--gri-border);
    border-radius:15px;
    margin-bottom:15px;
    cursor:pointer;
    padding:20px 25px;
    transition: 0.3s all ease;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-weight: 600;
    color: var(--ana-renk);
}

.accordion:hover { border-color: var(--accent); transform: translateX(10px); }

.accordion-content {
    max-height:0;
    overflow:hidden;
    transition: max-height 0.3s ease-out;
    background: var(--beyaz);
    padding: 0 25px;
}

.accordion-content p { padding:20px 0; color: var(--metin); line-height: 1.6; }

/* Cihazlar Grid */
.cihazlar-section { padding:100px 8%; text-align:center; background-color: var(--beyaz); }

.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:30px; margin-top:50px;}

.card {
    background: var(--beyaz);
    border: 1px solid var(--gri-border);
    padding:35px;
    border-radius:25px;
    transition: 0.4s all ease;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
}

.card:hover {
    transform: translateY(-12px);
    box-shadow: 0 20px 40px rgba(10, 31, 68, 0.1);
    border-color: var(--accent);
}

.set-card {
    background: #eff6ff;
    border: 2px dashed var(--accent);
}

.telsiz-img {
    width:100%; height:250px;
    object-fit:contain;
    margin-bottom:25px;
}

.card h3 { color: var(--ana-renk); margin-bottom:12px; font-size: 1.3rem; }
.card p { font-size:0.95rem; color: var(--metin); opacity:0.8; }

/* Referanslar */
.references-section { padding:100px 8%; background-color: var(--acik-gri); }

.references-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    align-items:center;
}

.ref-item {
    background: var(--beyaz);
    border: 1px solid var(--gri-border);
    padding: 25px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: 0.4s;
}

.ref-item:hover { transform: scale(1.03); border-color: var(--accent); }
