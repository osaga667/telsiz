<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<title>Lider Telsiz | Profesyonel Haberleşme</title>
<link href="https://googleapis.com" rel="stylesheet">
<link rel="stylesheet" href="https://cloudflare.com">
<style>
    :root { --ana-renk: #0a1f44; --accent: #1e40af; --beyaz: #ffffff; --acik-gri: #f8fafc; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--beyaz); color: #1e293b; scroll-behavior: smooth; }
    
    /* Yan Menü */
    .menu-toggle { position: fixed; top: 25px; left: 25px; width: 50px; height: 50px; background: var(--ana-renk); color: white; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; z-index: 1100; }
    .side-menu { position: fixed; top: 0; left: -350px; width: 320px; height: 100%; background: var(--ana-renk); z-index: 1200; transition: 0.5s; padding: 80px 30px; }
    .side-menu.active { left: 0; }
    .menu-links a { display: flex; align-items: center; color: white; text-decoration: none; font-size: 1.1rem; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .close-btn { position: absolute; top: 25px; right: 25px; font-size: 40px; color: white; cursor: pointer; }

    header { padding: 15px 8% 15px 90px; display: flex; align-items: center; background: white; position: fixed; width: 100%; top:0; z-index:1000; border-bottom: 1px solid #eee; }
    .logo-text { font-family:'Orbitron'; color: var(--ana-renk); font-weight:900; font-size:1.5rem; margin-left: 10px; }
    .hero { height: 80vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; background: radial-gradient(circle, #fff 0%, #f1f5f9 100%); padding-top: 100px; }
    .btn { background: var(--ana-renk); color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 700; margin-top: 20px; }
</style>
</head>
<body>
    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="side-menu" id="sideMenu">
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
        <div class="menu-links">
            <a href="index.html"><i class="fas fa-home"></i> Ana Sayfa</a>
            <a href="interco.html"><i class="fas fa-headset"></i> İnterkom Sistemleri</a>
            <a href="https://wa.me"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>
    <header><img src="logo.png" height="40"><span class="logo-text">LİDER TELSİZ</span></header>
    <section class="hero">
        <h1 style="font-family:'Orbitron'; font-size: 3rem;">LİDER TELSİZ</h1>
        <p>Profesyonel Set Tedariği ve Haberleşme Çözümleri</p>
        <a href="tel:+905395926070" class="btn">0539 592 60 70</a>
    </section>
    <script>function toggleMenu(){document.getElementById('sideMenu').classList.toggle('active');}</script>
</body>
</html>
