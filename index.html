<!DOCTYPE html>
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lider Telsiz | Profesyonel Haberleşme Çözümleri</title>
    <meta name="description" content="İstanbul'da profesyonel telsiz kiralama hizmetleri. Film seti, organizasyon ve güvenlik ekipleri için hızlı çözüm.">

    <!-- Yazı Tipleri ve İkonlar -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="https://cloudflare.com"/>

    <style>
        :root {
            --ana-renk: #0a1f44;
            --accent: #1e40af;
            --beyaz: #ffffff;
            --acik-gri: #f8fafc;
            --gri-border: #e2e8f0;
            --metin: #1e293b;
            --glass-shine: rgba(255, 255, 255, 0.8);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--beyaz);
            color: var(--metin);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Yan Menü (Side Menu) Stilleri */
        .menu-toggle {
            position: fixed;
            top: 25px; 
            left: 25px;
            width: 50px;
            height: 50px;
            background: var(--ana-renk);
            color: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 1100;
            transition: 0.3s all ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -350px; 
            width: 320px;
            height: 100%;
            background: var(--ana-renk); 
            z-index: 1200; 
            transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0); 
            padding: 80px 30px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
        }

        .side-menu.active { left: 0; }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .menu-links a {
            display: block;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .menu-links a:hover { color: #3b82f6; }

        /* Header */
        header {
            padding: 15px 8% 15px 90px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            position: fixed;
            width: 100%;
            top:0;
            z-index:1000;
            border-bottom: 1px solid var(--gri-border);
            backdrop-filter: blur(10px);
        }

        .logo-text {
            font-family:'Orbitron',sans-serif;
            color: var(--ana-renk);
            font-weight:900;
            font-size:1.5rem;
        }

        /* Hero Bölümü */
        .hero {
            height: 100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%);
        }

        .hero h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            color: var(--ana-renk);
            margin-bottom: 20px;
        }

        .btn-teklif {
            background: var(--ana-renk);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Footer */
        footer {
            background: var(--ana-renk);
            color: white;
            text-align: center;
            padding: 40px 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <!-- Menü Butonu -->
    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <!-- Yan Menü -->
    <div class="side-menu" id="sideMenu">
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
        <div class="menu-links">
            <a href="#"><i class="fas fa-home"></i> Ana Sayfa</a>
            <a href="#cihazlar"><i class="fas fa-broadcast-tower"></i> Cihazlar</a>
            <a href="#hizmetler"><i class="fas fa-tools"></i> Hizmetler</a>
            <a href="#iletisim"><i class="fas fa-phone"></i> İletişim</a>
        </div>
    </div>

    <header>
        <div class="logo-box">
            <span class="logo-text">LİDER TELSİZ</span>
        </div>
    </header>

    <section class="hero">
        <h1 class="animate__animated animate__fadeInDown">Profesyonel Haberleşme Çözümleri</h1>
        <p style="margin-bottom: 30px; font-size: 1.2rem;">Kiralama, Satış ve Teknik Servis</p>
        <a href="https://wa.me" class="btn-teklif">Hızlı Teklif Al</a>
    </section>

    <footer id="iletisim">
        <p>&copy; 2024 Lider Telsiz - Tüm Hakları Saklıdır.</p>
        <p>İstanbul / Türkiye</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }
    </script>

</body>
</html>
